<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivist WebUI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orbit bg-orbit-a"></div>
    <div class="bg-orbit bg-orbit-b"></div>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Archivist</p>
          <h1>Memory Control Room</h1>
        </div>
        <div class="project-picker">
          <label for="projectId">Project</label>
          <input id="projectId" placeholder="proj-1" value="proj-1" />
        </div>
      </header>

      <nav class="tabs" id="tabs">
        <a href="#/search">Search</a>
        <a href="#/graph">Graph</a>
        <a href="#/decisions">Decisions</a>
        <a href="#/incidents">Incidents</a>
        <a href="#/conflicts">Conflicts</a>
        <a href="#/controls">Controls</a>
      </nav>

      <main id="app" class="panel"></main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
